<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Портал Компании — Blocko Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 850: '#1a202c', 900: '#0f172a', 950: '#0b0f19' } } } } }</script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col">
  <header class="px-8 py-5 border-b border-gray-200 dark:border-gray-800 bg-white/70 dark:bg-gray-900/70 backdrop-blur-xl flex justify-between items-center sticky top-0 z-20">
     <div class="flex items-center gap-3">
       <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/30"><i data-lucide="globe"></i></div>
       <h1 class="text-xl font-bold tracking-tight" id="portalHeaderName">Загрузка...</h1>
     </div>
     <a href="index.html" class="px-5 py-2.5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-xl text-sm font-bold shadow-md hover:scale-105 transition-transform">Создать свой Blocko</a>
  </header>
  
  <main class="p-8 max-w-5xl mx-auto w-full flex-1 animate-fade-in-up">
     <div class="text-center mb-16 mt-8">
        <h2 class="text-5xl font-black mb-5 tracking-tight" id="companyTitle">...</h2>
        <p class="text-gray-500 dark:text-gray-400 max-w-2xl mx-auto text-lg" id="companyDesc">...</p>
        <a id="companyWebsite" target="_blank" class="mt-6 inline-flex items-center gap-2 px-6 py-3 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 font-bold rounded-full hover:bg-indigo-100 dark:hover:bg-indigo-900/40 transition-colors hidden"><i data-lucide="external-link" class="w-4 h-4"></i> Официальный сайт</a>
     </div>

     <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
        <div>
           <h3 class="text-xl font-bold mb-6 flex items-center gap-2 border-b border-gray-200 dark:border-gray-800 pb-3"><i data-lucide="trello" class="w-5 h-5 text-blue-500"></i> Публичные RoadMap</h3>
           <div id="publicBoardsList" class="flex flex-col gap-4">
              <div class="animate-pulse flex gap-4 p-4 border border-gray-200 dark:border-gray-800 rounded-2xl"><div class="w-12 h-12 bg-gray-200 dark:bg-gray-800 rounded-xl"></div><div class="flex-1 space-y-2"><div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-1/2"></div><div class="h-3 bg-gray-200 dark:bg-gray-800 rounded w-1/4"></div></div></div>
           </div>
        </div>
        <div>
           <h3 class="text-xl font-bold mb-6 flex items-center gap-2 border-b border-gray-200 dark:border-gray-800 pb-3"><i data-lucide="briefcase" class="w-5 h-5 text-emerald-500"></i> Открытые Вакансии</h3>
           <div id="publicJobsList" class="flex flex-col gap-4">
              <div class="animate-pulse flex gap-4 p-4 border border-gray-200 dark:border-gray-800 rounded-2xl"><div class="w-12 h-12 bg-gray-200 dark:bg-gray-800 rounded-xl"></div><div class="flex-1 space-y-2"><div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-1/2"></div><div class="h-3 bg-gray-200 dark:bg-gray-800 rounded w-1/4"></div></div></div>
           </div>
        </div>
     </div>
  </main>

  <script>
    if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
    lucide.createIcons();
    
    const urlParams = new URLSearchParams(window.location.search);
    const cid = urlParams.get('cid');

    async function loadPortal() {
       if (!cid) {
         document.getElementById('portalHeaderName').innerText = 'Ошибка доступа';
         document.getElementById('companyTitle').innerText = 'Неверная ссылка';
         document.getElementById('companyDesc').innerText = 'В ссылке отсутствует ID компании (?cid=...). Пожалуйста, перейдите по корректной ссылке, которую вам предоставили.';
         document.getElementById('publicBoardsList').innerHTML = '';
         document.getElementById('publicJobsList').innerHTML = '';
         return;
       }

       try {
         const userDoc = await db.collection('users').doc(cid).get();
         if (!userDoc.exists) {
           document.getElementById('companyTitle').innerText = 'Компания не найдена';
           document.getElementById('companyDesc').innerText = 'Возможно, ссылка устарела или профиль был удален.';
           return;
         }
         const data = userDoc.data();
         
         document.getElementById('portalHeaderName').innerText = data.companyName || 'Компания';
         document.getElementById('companyTitle').innerText = data.companyName || 'Без названия';
         document.getElementById('companyDesc').innerText = data.companyDesc || 'Описание отсутствует.';
         
         if(data.companyWebsite) {
            const a = document.getElementById('companyWebsite');
            let link = data.companyWebsite;
            if (!/^https?:\/\//i.test(link)) link = 'http://' + link;
            a.href = link;
            a.classList.remove('hidden');
         }

         const jobs = data.companyJobs || [];
         const jobsList = document.getElementById('publicJobsList');
         if(jobs.length === 0) {
           jobsList.innerHTML = '<div class="p-6 text-center border border-dashed border-gray-200 dark:border-gray-800 rounded-2xl"><p class="text-gray-500 italic text-sm">В данный момент нет открытых вакансий</p></div>';
         } else {
            jobsList.innerHTML = jobs.map(j => `
              <a href="${j.link}" target="_blank" class="p-5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm hover:border-emerald-500 transition-all flex justify-between items-center group block">
                 <div>
                    <div class="font-bold text-gray-900 dark:text-white mb-1.5 group-hover:text-emerald-500 transition-colors">${j.title}</div>
                    <div class="text-xs text-emerald-600 dark:text-emerald-400 font-black">${j.salary}</div>
                 </div>
                 <div class="w-10 h-10 bg-gray-50 dark:bg-gray-900 rounded-full flex items-center justify-center group-hover:bg-emerald-50 dark:group-hover:bg-emerald-900/30 transition-colors"><i data-lucide="arrow-up-right" class="w-5 h-5 text-gray-400 group-hover:text-emerald-500 transition-colors"></i></div>
              </a>
            `).join('');
         }

         // Fetch public boards (Фильтрация на клиенте для обхода композитных индексов Firebase)
         const boardsSnap = await db.collection('boards').where('owner', '==', cid).get();
         const boardsList = document.getElementById('publicBoardsList');
         
         const publicBoards = [];
         boardsSnap.forEach(doc => {
            if (doc.data().isPublic === true) publicBoards.push({ id: doc.id, ...doc.data() });
         });

         if(publicBoards.length === 0) {
           boardsList.innerHTML = '<div class="p-6 text-center border border-dashed border-gray-200 dark:border-gray-800 rounded-2xl"><p class="text-gray-500 italic text-sm">Публичные доски пока не созданы</p></div>';
         } else {
            let bHtml = '';
            publicBoards.forEach(b => {
               bHtml += `
               <a href="board.html?b=${b.id}" target="_blank" class="p-5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm hover:border-blue-500 transition-all flex items-center gap-4 group block">
                  <div class="w-12 h-12 bg-blue-50 dark:bg-blue-900/20 text-blue-500 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform"><i data-lucide="kanban" class="w-6 h-6"></i></div>
                  <div class="flex-1">
                     <div class="font-bold text-gray-900 dark:text-white mb-1 group-hover:text-blue-500 transition-colors line-clamp-1">${b.title}</div>
                     <div class="text-[10px] text-gray-500 uppercase tracking-widest flex items-center gap-1"><i data-lucide="eye" class="w-3 h-3"></i> Public RoadMap</div>
                  </div>
                  <i data-lucide="chevron-right" class="w-5 h-5 text-gray-400 group-hover:text-blue-500 transition-colors"></i>
               </a>
               `;
            });
            boardsList.innerHTML = bHtml;
         }
         lucide.createIcons();

       } catch(e) {
         console.error(e);
         alert('Ошибка загрузки портала');
       }
    }
    loadPortal();
  </script>
</body>
</html>
