<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocko Pro - Enterprise Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Firebase Core -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    .glass-panel { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  </style>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 750: '#2d3748', 850: '#1a202c', 900: '#0f172a', 950: '#0b0f19' } } } } }
  </script>
</head>
<body class="bg-[#0B0F19] text-gray-100 min-h-screen flex overflow-hidden selection:bg-indigo-500/30">

<!-- Sidebar -->
<aside class="w-20 lg:w-64 border-r border-gray-800 bg-gray-900/50 glass-panel flex flex-col items-center lg:items-stretch py-6 transition-all z-20">
  <div class="flex items-center gap-3 px-0 lg:px-6 mb-10 justify-center lg:justify-start">
    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20 flex-shrink-0 border border-indigo-400/30">
      <i data-lucide="shield-alert" class="w-5 h-5 text-white"></i>
    </div>
    <h1 class="font-black text-xl tracking-tight hidden lg:block text-white">COMMAND<span class="text-indigo-500">.</span></h1>
  </div>

  <nav class="flex flex-col gap-2 px-3 w-full">
    <button class="flex items-center gap-3 p-3 lg:px-4 bg-indigo-500/10 text-indigo-400 rounded-xl font-bold border border-indigo-500/20 transition-all w-full justify-center lg:justify-start shadow-inner">
      <i data-lucide="database" class="w-5 h-5"></i><span class="hidden lg:block text-sm">База данных</span>
    </button>
    <button class="flex items-center gap-3 p-3 lg:px-4 text-gray-500 hover:text-white hover:bg-gray-800 rounded-xl font-bold transition-all w-full justify-center lg:justify-start opacity-50 cursor-not-allowed">
      <i data-lucide="activity" class="w-5 h-5"></i><span class="hidden lg:block text-sm">Логи системы</span>
    </button>
    <button onclick="window.location.href='index.html'" class="flex items-center gap-3 p-3 lg:px-4 text-gray-500 hover:text-white hover:bg-gray-800 rounded-xl font-bold transition-all w-full justify-center lg:justify-start mt-auto">
      <i data-lucide="log-out" class="w-5 h-5"></i><span class="hidden lg:block text-sm">Выйти в App</span>
    </button>
  </nav>
</aside>

<!-- Main -->
<main class="flex-1 flex flex-col h-screen overflow-hidden relative">
  <!-- Boot Loader -->
  <div id="loader" class="absolute inset-0 bg-[#0B0F19] z-50 flex flex-col items-center justify-center transition-opacity duration-500">
     <i data-lucide="loader-2" class="w-10 h-10 text-indigo-500 animate-spin mb-4"></i>
     <div class="text-sm font-bold text-gray-500 uppercase tracking-widest animate-pulse">Инициализация ядра БД...</div>
  </div>

  <header class="px-8 py-6 border-b border-gray-800 bg-gray-900/30 glass-panel flex justify-between items-center z-10 flex-shrink-0">
    <div>
      <h2 class="text-2xl font-black text-white mb-1">Управление пользователями</h2>
      <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest border border-indigo-500/30 bg-indigo-500/10 px-2 py-0.5 rounded-md inline-block">Enterprise Database Access</p>
    </div>
    <div class="flex items-center gap-4">
      <div class="relative">
        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
        <input type="text" id="adminSearch" oninput="renderTable()" placeholder="Поиск по Email, UID, Имени..." class="pl-10 pr-4 py-2.5 bg-gray-800/50 border border-gray-700 rounded-xl text-sm outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all w-64 text-white placeholder-gray-500 shadow-inner">
      </div>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto p-8 relative">
    <!-- Abstract Background Glow -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[300px] bg-indigo-600/10 blur-[120px] rounded-full pointer-events-none"></div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8 relative z-10">
      <div class="p-6 bg-gray-900/60 border border-gray-800 rounded-3xl flex flex-col shadow-lg backdrop-blur-sm hover:border-gray-700 transition-colors">
        <div class="text-gray-500 mb-2"><i data-lucide="users" class="w-5 h-5"></i></div>
        <div class="text-3xl font-black text-white" id="statUsers">0</div>
        <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">Всего аккаунтов</div>
      </div>
      <div class="p-6 bg-indigo-900/10 border border-indigo-500/20 rounded-3xl flex flex-col shadow-lg backdrop-blur-sm hover:border-indigo-500/40 transition-colors">
        <div class="text-indigo-400 mb-2"><i data-lucide="zap" class="w-5 h-5"></i></div>
        <div class="text-3xl font-black text-indigo-400" id="statPro">0</div>
        <div class="text-[10px] font-bold text-indigo-500/70 uppercase tracking-widest mt-1">PRO / Company</div>
      </div>
      <div class="p-6 bg-emerald-900/10 border border-emerald-500/20 rounded-3xl flex flex-col shadow-lg backdrop-blur-sm hover:border-emerald-500/40 transition-colors">
        <div class="text-emerald-400 mb-2"><i data-lucide="coins" class="w-5 h-5"></i></div>
        <div class="text-3xl font-black text-emerald-400" id="statCoins">0</div>
        <div class="text-[10px] font-bold text-emerald-500/70 uppercase tracking-widest mt-1">Монет в обороте</div>
      </div>
      <div class="p-6 bg-purple-900/10 border border-purple-500/20 rounded-3xl flex flex-col shadow-lg backdrop-blur-sm hover:border-purple-500/40 transition-colors">
        <div class="text-purple-400 mb-2"><i data-lucide="layout-dashboard" class="w-5 h-5"></i></div>
        <div class="text-3xl font-black text-purple-400" id="statBoards">0</div>
        <div class="text-[10px] font-bold text-purple-500/70 uppercase tracking-widest mt-1">Облачных досок</div>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-gray-900/60 border border-gray-800 rounded-3xl overflow-hidden shadow-2xl relative z-10 backdrop-blur-md">
      <table class="w-full text-left border-collapse">
        <thead class="bg-gray-800/50 border-b border-gray-800 text-[10px] font-black text-gray-500 uppercase tracking-widest">
          <tr>
            <th class="px-6 py-4">Пользователь</th>
            <th class="px-6 py-4">Тариф</th>
            <th class="px-6 py-4 text-center">Баланс (B)</th>
            <th class="px-6 py-4 text-center">Доски</th>
            <th class="px-6 py-4 text-center">Рефералы</th>
            <th class="px-6 py-4 text-right">Действия</th>
          </tr>
        </thead>
        <tbody id="usersTbody" class="divide-y divide-gray-800/50">
          <!-- JS Injects -->
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Edit Modal -->
<div id="editModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 glass-panel opacity-0 transition-opacity duration-300 px-4">
  <div class="bg-gray-900 p-8 rounded-[2rem] w-full max-w-md shadow-2xl border border-gray-800 transform scale-95 transition-transform relative overflow-hidden" id="editModalContent">
    <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-xl font-black text-white flex items-center gap-2"><i data-lucide="sliders" class="w-5 h-5 text-indigo-500"></i> Редактор профиля</h3>
      <button onclick="closeEditModal()" class="text-gray-500 hover:text-white transition-colors bg-gray-800 p-1.5 rounded-lg"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    
    <div class="space-y-4">
      <div>
         <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1 block">Тарифный план</label>
         <select id="editPlan" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl outline-none text-white focus:border-indigo-500 appearance-none font-bold transition-colors">
           <option value="free">Free (Базовый)</option>
           <option value="freelancer">Freelancer</option>
           <option value="pro">Company (Pro)</option>
           <option value="infinity">Infinity (God Mode)</option>
         </select>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1 block">Монеты (B-Coins)</label>
          <input type="number" id="editCoins" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl outline-none text-white focus:border-emerald-500 font-bold transition-colors shadow-inner" />
        </div>
        <div>
          <label class="text-[10px] font-black text-purple-500 uppercase tracking-widest mb-1 block">Рефералы</label>
          <input type="number" id="editRefs" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl outline-none text-white focus:border-purple-500 font-bold transition-colors shadow-inner" />
        </div>
      </div>
      <div>
        <label class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-1 block">Статус бейджа (Достижения)</label>
        <select id="editBadge" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl outline-none text-white focus:border-amber-500 appearance-none font-bold transition-colors">
           <option value="none">Нет бейджа</option>
           <option value="friend">Blocko Friend</option>
           <option value="partner">Blocko Partner</option>
           <option value="ambassador">Ambassador</option>
        </select>
      </div>
      <div>
         <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1 block">Бонусный AI Лимит (Запросов)</label>
         <input type="number" id="editAiLimit" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl outline-none text-white focus:border-indigo-500 font-bold transition-colors shadow-inner" />
      </div>
    </div>

    <div class="mt-8 flex gap-3">
      <button onclick="closeEditModal()" class="flex-1 py-3 text-sm font-bold text-gray-400 bg-gray-800 hover:bg-gray-700 rounded-xl transition-colors border border-gray-700">Отмена</button>
      <button onclick="saveUserChanges()" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-bold rounded-xl shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">Сохранить в БД</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="adminToast" class="fixed bottom-6 right-6 z-[200] transform translate-y-24 opacity-0 transition-all duration-300 bg-emerald-500 text-white px-5 py-3 rounded-2xl shadow-2xl font-bold text-sm flex items-center gap-2 pointer-events-none border border-emerald-400/50">
  <i data-lucide="check-circle-2" class="w-5 h-5"></i> <span id="toastText">Готово</span>
</div>

<script>
  lucide.createIcons();
  let allUsers = [];
  let boardsMap = {};
  let currentEditUid = null;

  // AUTH SECURITY GUARD
  auth.onAuthStateChanged(async (user) => {
    if (!user) return window.location.href = 'index.html';
    
    try {
        const userDoc = await db.collection('users').doc(user.uid).get();
        const data = userDoc.exists ? userDoc.data() : {};
        
        if (!data.isAdmin) {
            // ЭНТЕРПРАЙЗ: Бэкдор для инициализации владельца (Zero-Trust Bootstrap)
            const secret = prompt("BLOCKO PRO SECURITY:\\nВведите ключ шифрования для доступа к Command Center:");
            if (secret === "blocko_god_mode_2026") {
                await db.collection('users').doc(user.uid).set({ isAdmin: true }, { merge: true });
                showToast("Уровень доступа: GOD MODE. Обновление протоколов...");
                setTimeout(() => window.location.reload(), 1500);
            } else {
                window.location.href = 'index.html';
            }
            return;
        }
        
        // Авторизация пройдена - грузим тяжелую дату
        loadEnterpriseData();
    } catch(e) {
        console.error(e);
        window.location.href = 'index.html';
    }
  });

  async function loadEnterpriseData() {
    try {
      // 1. Агрегация досок (Map Reduce)
      const boardsSnap = await db.collection('boards').get();
      boardsMap = {};
      let totalBoards = 0;
      boardsSnap.forEach(doc => {
         const owner = doc.data().owner;
         if(owner) {
             boardsMap[owner] = (boardsMap[owner] || 0) + 1;
         }
         totalBoards++;
      });
      document.getElementById('statBoards').innerText = totalBoards;

      // 2. Агрегация пользователей
      const usersSnap = await db.collection('users').get();
      allUsers = [];
      let totalPro = 0;
      let totalCoins = 0;

      usersSnap.forEach(doc => {
        const u = { uid: doc.id, ...doc.data() };
        allUsers.push(u);
        if (u.plan === 'pro' || u.plan === 'freelancer' || u.plan === 'infinity') totalPro++;
        if (u.coins) totalCoins += parseInt(u.coins);
      });

      // Анимация счетчиков
      animateValue('statUsers', 0, allUsers.length, 1000);
      animateValue('statPro', 0, totalPro, 1000);
      animateValue('statCoins', 0, totalCoins, 1000);

      renderTable();

      // Убираем лоадер
      const loader = document.getElementById('loader');
      loader.classList.add('opacity-0');
      setTimeout(() => loader.remove(), 500);

    } catch (error) {
      console.error("Data load error", error);
      alert("Критическая ошибка загрузки БД");
    }
  }

  function animateValue(id, start, end, duration) {
      if (start === end) { document.getElementById(id).innerText = end; return; }
      let range = end - start;
      let current = start;
      let increment = end > start ? Math.ceil(range / (duration/16)) : -1;
      let stepTime = Math.abs(Math.floor(duration / range));
      let obj = document.getElementById(id);
      let timer = setInterval(function() {
          current += increment;
          if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
              current = end;
              clearInterval(timer);
          }
          obj.innerText = current;
      }, stepTime);
  }

  function renderTable() {
     const tbody = document.getElementById('usersTbody');
     const query = document.getElementById('adminSearch').value.toLowerCase();
     
     const filtered = allUsers.filter(u => {
         const searchStr = (u.name + ' ' + u.email + ' ' + u.uid).toLowerCase();
         return searchStr.includes(query);
     });

     filtered.sort((a,b) => {
         const bC = parseInt(b.coins || 0);
         const aC = parseInt(a.coins || 0);
         return bC - aC; // Сортируем по богатству (Киты наверху)
     });

     tbody.innerHTML = filtered.map(u => {
        const boardsCount = boardsMap[u.uid] || 0;
        const safeName = u.name || 'Аноним';
        const safeAvatar = u.customAvatar || u.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(safeName)}`;
        
        let planColor = 'bg-gray-800 text-gray-400 border border-gray-700';
        if (u.plan === 'freelancer') planColor = 'bg-blue-500/10 text-blue-400 border border-blue-500/30';
        if (u.plan === 'pro') planColor = 'bg-purple-500/10 text-purple-400 border border-purple-500/30 shadow-[0_0_10px_rgba(168,85,247,0.1)]';
        if (u.plan === 'infinity') planColor = 'bg-gradient-to-r from-orange-500/20 to-red-500/20 text-orange-400 shadow-lg border border-orange-500/40';

        return `
          <tr class="hover:bg-gray-800/40 transition-colors group">
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <img src="${safeAvatar}" class="w-10 h-10 rounded-full border border-gray-700 object-cover shadow-sm" />
                <div>
                  <div class="text-sm font-bold text-white flex items-center gap-1.5">
                    ${safeName} 
                    ${u.isAdmin ? '<i data-lucide="shield-check" class="w-3.5 h-3.5 text-indigo-500" title="Администратор"></i>' : ''}
                    ${u.badgeStatus && u.badgeStatus !== 'none' ? `<i data-lucide="award" class="w-3.5 h-3.5 text-amber-500" title="${u.badgeStatus}"></i>` : ''}
                  </div>
                  <div class="text-[10px] text-gray-500 font-mono mt-0.5">${u.email || u.uid}</div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4">
              <span class="px-2.5 py-1 rounded-md text-[10px] font-black uppercase tracking-widest ${planColor}">${u.plan || 'Free'}</span>
            </td>
            <td class="px-6 py-4 text-center">
              <div class="inline-flex items-center gap-1.5 text-emerald-400 font-black bg-emerald-500/10 px-2 py-1 rounded-lg border border-emerald-500/20">
                 <i data-lucide="coins" class="w-3.5 h-3.5"></i> ${u.coins || 0}
              </div>
            </td>
            <td class="px-6 py-4 text-center text-sm font-bold text-gray-400">${boardsCount}</td>
            <td class="px-6 py-4 text-center text-sm font-bold text-gray-400">${u.referralCount || 0}</td>
            <td class="px-6 py-4 text-right">
              <button onclick="openEditModal('${u.uid}')" class="p-2 bg-gray-800 text-gray-400 hover:text-white hover:bg-indigo-600 rounded-xl transition-all shadow-sm active:scale-95 border border-gray-700 hover:border-indigo-500">
                <i data-lucide="sliders" class="w-4 h-4"></i>
              </button>
            </td>
          </tr>
        `;
     }).join('');
     lucide.createIcons();
  }

  function openEditModal(uid) {
     const user = allUsers.find(u => u.uid === uid);
     if(!user) return;
     currentEditUid = uid;
     
     document.getElementById('editPlan').value = user.plan || 'free';
     document.getElementById('editCoins').value = user.coins || 0;
     document.getElementById('editRefs').value = user.referralCount || 0;
     document.getElementById('editBadge').value = user.badgeStatus || 'none';
     document.getElementById('editAiLimit').value = user.bonusAiLimit || 0;

     const modal = document.getElementById('editModal');
     const content = document.getElementById('editModalContent');
     modal.classList.remove('hidden');
     setTimeout(() => {
       modal.classList.remove('opacity-0');
       content.classList.remove('scale-95');
     }, 10);
  }

  function closeEditModal() {
     const modal = document.getElementById('editModal');
     const content = document.getElementById('editModalContent');
     modal.classList.add('opacity-0');
     content.classList.add('scale-95');
     setTimeout(() => { modal.classList.add('hidden'); currentEditUid = null; }, 300);
  }

  async function saveUserChanges() {
     if(!currentEditUid) return;
     const plan = document.getElementById('editPlan').value;
     const coins = parseInt(document.getElementById('editCoins').value) || 0;
     const refs = parseInt(document.getElementById('editRefs').value) || 0;
     const badge = document.getElementById('editBadge').value;
     const bonusAi = parseInt(document.getElementById('editAiLimit').value) || 0;

     try {
         // Сохранение в Firebase
         await db.collection('users').doc(currentEditUid).update({
             plan: plan,
             coins: coins,
             referralCount: refs,
             badgeStatus: badge,
             bonusAiLimit: bonusAi,
             updatedByAdmin: new Date().toISOString()
         });

         // Обновляем локальный стейт массива для перерисовки без рефетча
         const uIdx = allUsers.findIndex(u => u.uid === currentEditUid);
         if(uIdx > -1) {
             allUsers[uIdx].plan = plan;
             allUsers[uIdx].coins = coins;
             allUsers[uIdx].referralCount = refs;
             allUsers[uIdx].badgeStatus = badge;
             allUsers[uIdx].bonusAiLimit = bonusAi;
         }

         renderTable();
         closeEditModal();
         showToast('Профиль успешно обновлен!');
     } catch(e) {
         console.error(e);
         alert("Ошибка при сохранении: " + e.message);
     }
  }

  function showToast(text) {
      const t = document.getElementById('adminToast');
      document.getElementById('toastText').innerText = text;
      t.classList.remove('translate-y-24', 'opacity-0');
      setTimeout(() => {
          t.classList.add('translate-y-24', 'opacity-0');
      }, 3000);
  }
</script>
</body>
</html>
