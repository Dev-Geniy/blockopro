<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <title>Мои задачи - Blocko Pro</title>
  <meta name="description" content="Личный дашборд продуктивности. Просматривайте все задачи из онлайн и офлайн проектов, назначенные лично на вас.">
  <meta name="keywords" content="задачи, продуктивность, канбан, дашборд, тайм-менеджмент, blocko pro">
  <meta name="theme-color" content="#0f172a">
  
  <meta name="robots" content="noindex, nofollow">

  <!-- Фавикон -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polygon points='12 2 2 7 12 12 22 7 12 2'/><polyline points='2 17 12 22 22 17'/><polyline points='2 12 12 17 22 12'/></svg>" />

  <!-- Манифест -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="config.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
    .deadline-urgent { border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.05); }
    .glass-modal { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  </style>

  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 750: '#2d3748', 850: '#1a202c', 900: '#0f172a', 950: '#0b0f19' } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

<header class="px-8 py-5 border-b border-gray-200 dark:border-gray-800 bg-white/70 dark:bg-gray-900/70 backdrop-blur-xl sticky top-0 z-20 flex justify-between items-center">
  <div class="flex items-center gap-4">
    <a href="index.html" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all text-gray-500" title="Вернуться к проектам">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </a>
    <div>
      <h1 class="text-2xl font-bold tracking-tight">Персональный Дашборд</h1>
      <p class="text-xs text-indigo-500 font-bold uppercase tracking-widest mt-0.5 flex items-center gap-1.5">
        <i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Онлайн и офлайн задачи
      </p>
    </div>
  </div>
</header>

<main class="p-8 max-w-7xl mx-auto w-full flex-1">
  <div id="tasksGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 p-6 rounded-[2rem] shadow-sm animate-pulse flex flex-col h-48">
      <div class="flex justify-between mb-4"><div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-20"></div><div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-16"></div></div>
      <div class="h-6 bg-gray-200 dark:bg-gray-800 rounded w-3/4 mb-4"></div>
      <div class="h-3 bg-gray-200 dark:bg-gray-800 rounded w-full mb-2"></div><div class="h-3 bg-gray-200 dark:bg-gray-800 rounded w-2/3"></div>
    </div>
    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 p-6 rounded-[2rem] shadow-sm animate-pulse flex flex-col h-48">
      <div class="flex justify-between mb-4"><div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-20"></div><div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-16"></div></div>
      <div class="h-6 bg-gray-200 dark:bg-gray-800 rounded w-3/4 mb-4"></div>
      <div class="h-3 bg-gray-200 dark:bg-gray-800 rounded w-full mb-2"></div><div class="h-3 bg-gray-200 dark:bg-gray-800 rounded w-2/3"></div>
    </div>
    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 p-6 rounded-[2rem] shadow-sm animate-pulse flex flex-col h-48 hidden md:flex">
      <div class="flex justify-between mb-4"><div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-20"></div><div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-16"></div></div>
      <div class="h-6 bg-gray-200 dark:bg-gray-800 rounded w-3/4 mb-4"></div>
      <div class="h-3 bg-gray-200 dark:bg-gray-800 rounded w-full mb-2"></div><div class="h-3 bg-gray-200 dark:bg-gray-800 rounded w-2/3"></div>
    </div>
  </div>
</main>

<script>
  if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
  lucide.createIcons();
  let currentUser = null;

  auth.onAuthStateChanged(user => {
    if (user) { 
      currentUser = user; 
      loadAllMyTasks(); 
    } else { 
      window.location.href = 'index.html'; 
    }
  });

  // Вспомогательная функция очистки текста от Markdown для красивого превью
  function cleanMarkdown(text) {
    if (!text) return '<span class="italic opacity-50">Нет описания</span>';
    return text
      .replace(/(\*\*|__)(.*?)\1/g, '$2')
      .replace(/(\*|_)(.*?)\1/g, '$2')
      .replace(/\[[ x]\] /g, '• ')
      .replace(/#/g, '')
      .trim();
  }

  // Общая функция обработки доски (и онлайн, и офлайн)
  function processBoardForTasks(board, boardId, tasksArray, isLocal = false) {
    (board.columns || []).forEach(col => {
      (col.cards || []).forEach(card => {
        // Проверяем, есть ли на карточке тег с именем текущего пользователя
        const hasMyTag = card.tags && card.tags.some(tId => {
           const boardTag = (board.tags || []).find(bt => bt.id === tId);
           return boardTag && boardTag.name === currentUser.displayName;
        });

        if (!card.archived && hasMyTag) {
          tasksArray.push({ 
             ...card, 
             boardTitle: board.title || 'Без названия', 
             colName: col.name, 
             boardId: boardId,
             isLocal: isLocal 
          });
        }
      });
    });
  }

  async function loadAllMyTasks() {
    const grid = document.getElementById('tasksGrid');
    let myTasks = [];

    try {
      // 1. Ищем задачи в облачных (онлайн) досках Firebase
      const boardsSnapshot = await db.collection("boards").where("members", "array-contains", currentUser.uid).get();
      boardsSnapshot.forEach(doc => {
        processBoardForTasks(doc.data(), doc.id, myTasks, false);
      });

      // 2. Ищем задачи в офлайн (локальных) досках
      const localBoards = JSON.parse(localStorage.getItem('blocko_local_boards')) || {};
      Object.values(localBoards).forEach(board => {
        // Проверяем, являюсь ли я участником этой локальной доски
        if (board.members && board.members.includes(currentUser.uid)) {
          processBoardForTasks(board, board.id, myTasks, true);
        }
      });

      // 3. Сортировка по дедлайну (сначала те, что горят, потом без дедлайна)
      myTasks.sort((a, b) => {
        if (!a.dueDate) return 1; 
        if (!b.dueDate) return -1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      });

      renderTasks(myTasks);
    } catch (e) { 
      grid.innerHTML = '<div class="col-span-full py-20 text-center text-red-500 font-bold"><i data-lucide="alert-circle" class="w-10 h-10 mx-auto mb-3"></i> Ошибка сборки задач. Проверьте интернет соединение.</div>'; 
      lucide.createIcons();
    }
  }

  function renderTasks(tasks) {
    const grid = document.getElementById('tasksGrid');
    
    // Пустое состояние
    if (tasks.length === 0) {
      grid.innerHTML = `
        <div class="col-span-full py-24 flex flex-col items-center opacity-70">
          <div class="p-5 bg-indigo-50 dark:bg-indigo-900/20 rounded-full mb-4 shadow-sm border border-indigo-100 dark:border-indigo-800">
            <i data-lucide="coffee" class="w-10 h-10 text-indigo-500"></i>
          </div>
          <h3 class="text-xl font-bold mb-2 text-gray-900 dark:text-white">Задач для вас пока нет</h3>
          <p class="text-sm text-gray-500">Отдыхайте или создайте новые карточки и добавьте на них тег с вашим именем.</p>
        </div>`;
      lucide.createIcons();
      return;
    }

    const today = new Date().toISOString().split('T')[0];

    grid.innerHTML = tasks.map(card => {
      const isOverdue = card.dueDate && card.dueDate < today;
      const dateText = card.dueDate ? new Date(card.dueDate).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }) : 'Без срока';
      
      let checklistStatus = '';
      if (card.checklist && card.checklist.length > 0) {
        const done = card.checklist.filter(i => i.isCompleted).length;
        const percent = Math.round((done / card.checklist.length) * 100);
        checklistStatus = `<div class="mt-4"><div class="flex justify-between text-[10px] mb-1.5 font-bold text-gray-500 uppercase tracking-widest"><span>Чек-лист</span><span>${percent}%</span></div><div class="w-full h-1.5 bg-gray-200 dark:bg-gray-800 rounded-full overflow-hidden"><div class="${done === card.checklist.length ? 'bg-green-500' : 'bg-indigo-500'} h-full transition-all" style="width:${percent}%"></div></div></div>`;
      }

      // Бейджик ОФЛАЙН если задача локальная
      const localBadge = card.isLocal 
        ? `<span class="text-[9px] font-bold px-2 py-1 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800 rounded-md flex items-center gap-1" title="Эта задача из локального проекта"><i data-lucide="hard-drive" class="w-3 h-3"></i> ОФЛАЙН</span>` 
        : '';

      const cleanDesc = cleanMarkdown(card.description);

      return `
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 p-6 rounded-[2rem] shadow-sm hover:shadow-xl hover:-translate-y-1 hover:border-indigo-400 transition-all duration-300 relative group flex flex-col h-full ${isOverdue ? 'deadline-urgent border-red-200 dark:border-red-900' : ''}">
          <div class="flex justify-between items-start mb-4">
            <div class="flex gap-2 flex-wrap items-center">
              <span class="text-[10px] font-bold px-2 py-1 bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 rounded-md uppercase tracking-wider border border-indigo-100 dark:border-indigo-800/50 truncate max-w-[150px]" title="${card.boardTitle}">${card.boardTitle}</span>
              ${localBadge}
            </div>
            <div class="flex items-center gap-1 text-[10px] font-bold px-2 py-1 rounded-md ${isOverdue ? 'bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400' : 'bg-gray-100 text-gray-500 dark:bg-gray-800'} whitespace-nowrap">
              <i data-lucide="clock" class="w-3 h-3"></i> ${dateText}
            </div>
          </div>
          
          <h3 class="font-bold text-lg mb-2 text-gray-900 dark:text-white line-clamp-2 leading-tight">${card.title}</h3>
          <p class="text-xs text-gray-500 dark:text-gray-400 line-clamp-3 mb-4 leading-relaxed">${cleanDesc}</p>
          
          <div class="mt-auto">
            ${checklistStatus}
            <div class="flex justify-between items-center mt-6 pt-5 border-t border-gray-100 dark:border-gray-800">
              <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"><i data-lucide="layout-template" class="w-3 h-3 inline pb-0.5"></i> ${card.colName}</span>
              <a href="board.html?b=${card.boardId}" class="px-4 py-2.5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 hover:bg-indigo-600 dark:hover:bg-indigo-500 hover:text-white text-xs font-bold rounded-xl hover:scale-105 transition-all shadow-md flex items-center gap-1">К задаче <i data-lucide="arrow-right" class="w-3 h-3"></i></a>
            </div>
          </div>
        </div>
      `;
    }).join('');
    
    lucide.createIcons();
  }
</script>
</body>
</html>
