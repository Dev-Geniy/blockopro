<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocko Market - Магазин улучшений</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polygon points='12 2 2 7 12 12 22 7 12 2'/><polyline points='2 17 12 22 22 17'/><polyline points='2 12 12 17 22 12'/></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .shelf-title { position: relative; display: flex; items-center: center; gap: 1rem; margin-bottom: 2rem; }
    .shelf-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .card-zoom:hover { transform: translateY(-8px) scale(1.02); }
  </style>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 950: '#0b0f19' } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

<header class="px-8 py-5 border-b border-gray-200 dark:border-gray-800 bg-white/70 dark:bg-gray-900/70 backdrop-blur-xl sticky top-0 z-50 flex justify-between items-center">
  <div class="flex items-center gap-4">
    <a href="index.html" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all text-gray-500"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
    <div>
      <h1 class="text-xl font-bold tracking-tight">Blocko Market</h1>
      <p class="text-[10px] text-blue-500 font-bold uppercase tracking-[0.2em]">Upgrade your power</p>
    </div>
  </div>

  <div class="flex gap-4">
    <div class="flex flex-col items-end px-4 border-r border-gray-800">
      <span class="text-[9px] font-bold text-gray-500 uppercase">Бонусные баллы</span>
      <div class="flex items-center gap-2 text-indigo-400 font-black"><i data-lucide="gem" class="w-4 h-4"></i> <span id="valCredits">0</span></div>
    </div>
    <div class="flex flex-col items-end">
      <span class="text-[9px] font-bold text-gray-500 uppercase">Реальные монеты</span>
      <div class="flex items-center gap-2 text-amber-500 font-black"><i data-lucide="coins" class="w-4 h-4"></i> <span id="valCoins">0</span></div>
    </div>
  </div>
</header>

<main class="p-8 max-w-7xl mx-auto w-full flex-1">
  
  <section class="mb-16">
    <div class="shelf-title">
      <div class="p-2 bg-blue-500/10 rounded-lg text-blue-500"><i data-lucide="zap" class="w-5 h-5"></i></div>
      <h2 class="text-sm font-black uppercase tracking-widest text-gray-400">Полка 1: Лимиты Нейросети</h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="shelfAI"></div>
  </section>

  <section class="mb-16">
    <div class="shelf-title">
      <div class="p-2 bg-indigo-500/10 rounded-lg text-indigo-500"><i data-lucide="shield-check" class="w-5 h-5"></i></div>
      <h2 class="text-sm font-black uppercase tracking-widest text-gray-400">Полка 2: Тарифы за приглашения (Кредиты)</h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="shelfPlans"></div>
  </section>

  <section class="mb-16">
    <div class="shelf-title">
      <div class="p-2 bg-rose-500/10 rounded-lg text-rose-500"><i data-lucide="gift" class="w-5 h-5"></i></div>
      <h2 class="text-sm font-black uppercase tracking-widest text-gray-400">Полка 3: Подарочные Gift-Сундуки (Coins)</h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="shelfGifts"></div>
  </section>

</main>

<div id="globalToast" class="fixed bottom-6 right-6 z-[100] transform translate-y-24 opacity-0 transition-all duration-500 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 p-4 rounded-2xl shadow-2xl flex items-start gap-4 max-w-sm pointer-events-none">
  <div id="toastIconBg" class="p-2.5 rounded-full flex-shrink-0 bg-blue-50 dark:bg-blue-900/30"><i id="toastIcon" data-lucide="info" class="w-5 h-5 text-blue-500"></i></div>
  <div><h4 id="toastTitle" class="text-sm font-bold text-gray-900 dark:text-white mb-1">Уведомление</h4><p id="toastDesc" class="text-xs text-gray-500 leading-relaxed"></p></div>
</div>

<script>
  if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
  lucide.createIcons();

  let currentUser = null;
  let balances = { coins: 0, credits: 0 };

  const PRODUCTS = {
    AI: [
      { id: 'ai_50', name: 'AI Импульс', desc: 'Разовое добавление +50 генераций.', price: 200, currency: 'credits', icon: 'zap', color: 'blue' },
      { id: 'ai_200', name: 'AI Шторм', desc: 'Разовое добавление +200 генераций.', price: 600, currency: 'credits', icon: 'zap-off', color: 'cyan' },
      { id: 'ai_daily_sub', name: 'AI Безлимит (Месяц)', desc: '250 генераций в день, обновление каждые 24 часа.', price: 1500, currency: 'credits', icon: 'sparkles', color: 'indigo' }
    ],
    PLANS: [
      { id: 'plan_freelancer', name: 'Freelancer Cloud', desc: 'Разблокирует 10 облачных досок навсегда.', price: 1000, currency: 'credits', icon: 'user', color: 'emerald' },
      { id: 'plan_company', name: 'Company Cloud', desc: 'Безлимит облачных досок и командных ролей.', price: 3000, currency: 'credits', icon: 'building', color: 'purple' },
      { id: 'vip_status', name: 'VIP Статус', desc: 'Особая золотая иконка и приоритет в поддержке.', price: 5000, currency: 'credits', icon: 'award', color: 'amber' }
    ],
    GIFTS: [
      { id: 'gift_20', name: 'Gift Box $20', desc: 'Создает код на 2000 монет для любого пользователя.', price: 200, currency: 'coins', icon: 'box', color: 'rose' },
      { id: 'gift_100', name: 'Gift Box $100', desc: 'Создает код на 10 000 монет для подарка коллеге.', price: 1000, currency: 'coins', icon: 'package', color: 'pink' },
      { id: 'gift_200', name: 'Gift Chest $200', desc: 'Эпический сундук на 20 000 монет. Лучший выбор.', price: 2000, currency: 'coins', icon: 'archive', color: 'orange' }
    ]
  };

  auth.onAuthStateChanged(user => {
    if (user) { currentUser = user; loadBalances(); renderAll(); }
    else { window.location.href = 'index.html'; }
  });

  async function loadBalances() {
    const userDoc = await db.collection('users').doc(currentUser.uid).get();
    const affDoc = await db.collection('affiliates').doc(currentUser.uid).get();
    balances.coins = userDoc.exists ? (userDoc.data().coins || 0) : 0;
    balances.credits = affDoc.exists ? (affDoc.data().earnedCredits || 0) : 0;
    document.getElementById('valCoins').innerText = balances.coins;
    document.getElementById('valCredits').innerText = balances.credits;
  }

  function renderShelf(data, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = data.map(p => `
      <div class="card-zoom bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 p-6 rounded-[2.5rem] shadow-sm flex flex-col transition-all duration-300">
        <div class="w-12 h-12 bg-${p.color}-500/10 text-${p.color}-500 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="${p.icon}"></i></div>
        <h3 class="font-bold text-lg mb-1">${p.name}</h3>
        <p class="text-xs text-gray-500 dark:text-gray-400 mb-6 flex-1">${p.desc}</p>
        <button onclick="handlePurchase('${p.id}', '${p.currency}', ${p.price})" class="w-full py-3 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 ${p.currency === 'coins' ? 'bg-amber-500 text-white shadow-lg shadow-amber-500/20' : 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20'} active:scale-95">
          Купить за ${p.price} ${p.currency === 'coins' ? 'Coins' : 'Credits'}
        </button>
      </div>
    `).join('');
    lucide.createIcons();
  }

  function renderAll() {
    renderShelf(PRODUCTS.AI, 'shelfAI');
    renderShelf(PRODUCTS.PLANS, 'shelfPlans');
    renderShelf(PRODUCTS.GIFTS, 'shelfGifts');
  }

  async function handlePurchase(prodId, currency, price) {
    if (currency === 'coins' && balances.coins < price) return showSystemToast('Недостаточно монет', 'Пополните баланс реальной валютой.', 'alert-circle', 'text-red-500', 'bg-red-50');
    if (currency === 'credits' && balances.credits < price) return showSystemToast('Недостаточно кредитов', 'Приглашайте больше партнеров!', 'alert-circle', 'text-indigo-500', 'bg-indigo-50');

    if (!confirm('Подтвердить покупку?')) return;

    try {
      const batch = db.batch();
      const userRef = db.collection('users').doc(currentUser.uid);
      const affRef = db.collection('affiliates').doc(currentUser.uid);

      // Списание
      if (currency === 'coins') batch.update(userRef, { coins: firebase.firestore.FieldValue.increment(-price) });
      else batch.update(affRef, { earnedCredits: firebase.firestore.FieldValue.increment(-price) });

      // Логика выдачи
      if (prodId.startsWith('ai_')) {
        if (prodId === 'ai_50') batch.set(userRef, { bonusAiLimit: firebase.firestore.FieldValue.increment(50) }, { merge: true });
        if (prodId === 'ai_200') batch.set(userRef, { bonusAiLimit: firebase.firestore.FieldValue.increment(200) }, { merge: true });
        if (prodId === 'ai_daily_sub') batch.set(userRef, { aiDailySub: true, aiSubExpires: Date.now() + (30*24*60*60*1000) }, { merge: true });
      }
      
      if (prodId.startsWith('plan_')) batch.update(userRef, { plan: prodId.replace('plan_', '') });

      if (prodId.startsWith('gift_')) {
        const amount = parseInt(prodId.replace('gift_', '')) * 100; // Пример курса $1 = 100 монет
        const code = 'GIFT-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        batch.set(db.collection('gifts').doc(code), { creator: currentUser.uid, amount, isUsed: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert('Ваш Gift-код: ' + code);
      }

      await batch.commit();
      confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
      showSystemToast('Поздравляем!', 'Покупка успешно завершена.', 'check-circle', 'text-green-500', 'bg-green-50');
      loadBalances();
    } catch (e) { console.error(e); }
  }

  function showSystemToast(title, desc, icon, color, bg) {
    const t = document.getElementById('globalToast');
    document.getElementById('toastTitle').innerText = title;
    document.getElementById('toastDesc').innerText = desc;
    document.getElementById('toastIcon').setAttribute('data-lucide', icon);
    document.getElementById('toastIconBg').className = `p-2.5 rounded-full flex-shrink-0 ${bg}`;
    lucide.createIcons();
    t.classList.remove('translate-y-24', 'opacity-0');
    setTimeout(() => t.classList.add('translate-y-24', 'opacity-0'), 5000);
  }
</script>
</body>
</html>
