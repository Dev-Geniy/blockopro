<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocko Store — Магазин услуг</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="config.js"></script>
    <style>
        .rainbow-ring {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            background-size: 400% 400%;
            animation: rainbow 5s ease infinite;
        }
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white min-h-screen">
    
    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-16">
            <div>
                <h1 class="text-4xl font-black mb-2">Blocko Store</h1>
                <p class="text-slate-500">Улучшайте возможности своей команды</p>
            </div>
            <div class="bg-indigo-600/10 border border-indigo-500/20 px-6 py-3 rounded-2xl flex items-center gap-4">
                <div class="text-right">
                    <div class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Мой баланс</div>
                    <div id="userBonusBalance" class="text-xl font-black text-indigo-500">0.00$</div>
                </div>
                <div class="w-10 h-10 bg-indigo-500 text-white rounded-xl flex items-center justify-center">
                    <i data-lucide="gem"></i>
                </div>
            </div>
        </div>

        <div id="storeGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

    <script>
        // Логика отрисовки магазина
        function renderStore() {
            const grid = document.getElementById('storeGrid');
            grid.innerHTML = BLOCKO_STORE.map(item => `
                <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] p-8 border border-slate-200 dark:border-slate-800 transition-all hover:border-indigo-500 group">
                    <div class="flex justify-between items-start mb-8">
                        <div class="p-4 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-2xl group-hover:bg-indigo-500 group-hover:text-white transition-colors">
                            <i data-lucide="${item.icon}" class="w-8 h-8"></i>
                        </div>
                        <div class="text-3xl font-black">${item.price}$</div>
                    </div>
                    
                    <h3 class="text-xl font-bold mb-2">${item.name}</h3>
                    <p class="text-slate-500 text-sm mb-8 leading-relaxed">${item.desc}</p>
                    
                    <div class="space-y-3">
                        ${item.canPayWithBonus ? `
                            <button onclick="processPurchase('${item.id}', 'bonus')" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-500 active:scale-95 transition-all">
                                Оплатить бонусными $
                            </button>
                        ` : ''}
                        <button onclick="processPurchase('${item.id}', 'real')" class="w-full py-4 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white rounded-2xl font-bold hover:bg-slate-200 dark:hover:bg-slate-700 active:scale-95 transition-all">
                            Купить картой
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Инициализация при загрузке
        auth.onAuthStateChanged(user => {
            if (user) {
                renderStore();
                updateBalanceUI(user.uid);
            } else {
                window.location.href = 'index.html';
            }
        });

        async function updateBalanceUI(uid) {
            const doc = await db.collection('affiliates').doc(uid).get();
            const balance = doc.exists ? (doc.data().earnedCredits || 0) : 0;
            document.getElementById('userBonusBalance').innerText = balance.toFixed(2) + '$';
        }

        function processPurchase(itemId, method) {
            console.log('Покупка:', itemId, 'Метод:', method);
            // Здесь будет логика обработки платежа
        }
    </script>
</body>
</html>
