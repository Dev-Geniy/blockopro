<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8">
  <title>Конструктор портала — Blocko Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="config.js"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 850: '#1a202c', 900: '#0f172a', 950: '#0b0f19' } } } } }</script>
  <style>
    .drag-handle { cursor: grab; }
    .drag-handle:active { cursor: grabbing; }
    .sortable-ghost { opacity: 0.4; }
    .hide-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col">
  <header class="px-8 py-5 border-b border-gray-200 dark:border-gray-800 bg-white/70 dark:bg-gray-900/70 backdrop-blur-xl flex justify-between items-center sticky top-0 z-20">
     <div class="flex items-center gap-4">
       <a href="index.html" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
       <div>
         <h1 class="text-xl font-bold tracking-tight flex items-center gap-2"><i data-lucide="layout-dashboard" class="w-5 h-5 text-indigo-500"></i> Конструктор портала</h1>
         <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mt-0.5">Управление контентом публичной страницы</p>
       </div>
     </div>
     <button onclick="saveAllPortalData()" id="saveGlobalBtn" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-bold shadow-lg shadow-indigo-500/25 active:scale-95 transition-all flex items-center gap-2">
       <i data-lucide="save" class="w-4 h-4"></i> Сохранить изменения
     </button>
  </header>

  <main class="p-8 max-w-7xl mx-auto w-full flex-1 grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- Текущие задачи -->
    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-[2rem] p-6 flex flex-col h-[75vh]">
      <h3 class="text-lg font-bold mb-4 flex items-center gap-2 border-b border-gray-100 dark:border-gray-800 pb-3"><i data-lucide="activity" class="w-5 h-5 text-blue-500"></i> Текущие задачи</h3>
      <div class="flex gap-2 mb-4">
        <input type="text" id="newTaskInput" placeholder="Над чем работаете?" class="flex-1 px-4 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 dark:text-white">
        <button onclick="addTask()" class="p-2.5 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-200 dark:hover:bg-blue-800/50 rounded-xl transition-colors"><i data-lucide="plus" class="w-5 h-5"></i></button>
      </div>
      <div id="tasksList" class="flex-1 overflow-y-auto hide-scroll flex flex-col gap-2"></div>
    </div>

    <!-- Вакансии -->
    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-[2rem] p-6 flex flex-col h-[75vh]">
      <h3 class="text-lg font-bold mb-4 flex items-center gap-2 border-b border-gray-100 dark:border-gray-800 pb-3"><i data-lucide="briefcase" class="w-5 h-5 text-emerald-500"></i> Вакансии</h3>
      <div class="flex flex-col gap-2 mb-4 p-3 bg-gray-50 dark:bg-gray-800/50 rounded-2xl border border-gray-100 dark:border-gray-700">
        <input type="text" id="newJobTitle" placeholder="Должность" class="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg text-xs outline-none focus:ring-1 focus:ring-emerald-500 dark:text-white">
        <div class="flex gap-2">
          <input type="text" id="newJobSalary" placeholder="Зарплата ($)" class="w-1/3 px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg text-xs outline-none focus:ring-1 focus:ring-emerald-500 dark:text-white">
          <input type="text" id="newJobLink" placeholder="Ссылка (URL)" class="flex-1 px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg text-xs outline-none focus:ring-1 focus:ring-emerald-500 dark:text-white">
        </div>
        <button onclick="addJob()" class="w-full py-2 mt-1 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 font-bold rounded-lg text-xs hover:bg-emerald-200 dark:hover:bg-emerald-800/50 transition-colors">Добавить вакансию</button>
      </div>
      <div id="jobsList" class="flex-1 overflow-y-auto hide-scroll flex flex-col gap-2"></div>
    </div>

    <!-- RoadMap -->
    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-[2rem] p-6 flex flex-col h-[75vh]">
      <h3 class="text-lg font-bold mb-4 flex items-center gap-2 border-b border-gray-100 dark:border-gray-800 pb-3"><i data-lucide="map" class="w-5 h-5 text-purple-500"></i> RoadMap</h3>
      <div class="flex flex-col gap-2 mb-4 p-3 bg-gray-50 dark:bg-gray-800/50 rounded-2xl border border-gray-100 dark:border-gray-700">
        <div class="flex gap-2">
          <input type="text" id="newRmQuarter" placeholder="Q3 2026" class="w-1/3 px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg text-xs outline-none focus:ring-1 focus:ring-purple-500 dark:text-white">
          <input type="text" id="newRmTitle" placeholder="Заголовок" class="flex-1 px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg text-xs outline-none focus:ring-1 focus:ring-purple-500 dark:text-white">
        </div>
        <input type="text" id="newRmDesc" placeholder="Короткое описание" class="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg text-xs outline-none focus:ring-1 focus:ring-purple-500 dark:text-white">
        <div class="flex items-center gap-2 mt-1">
          <select id="newRmColor" class="flex-1 px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg text-xs outline-none cursor-pointer dark:text-white">
            <option value="blue">Синий</option>
            <option value="purple">Фиолетовый</option>
            <option value="emerald">Изумрудный</option>
            <option value="rose">Розовый</option>
            <option value="amber">Желтый</option>
          </select>
          <button onclick="addRoadmap()" class="flex-1 py-2 bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 font-bold rounded-lg text-xs hover:bg-purple-200 dark:hover:bg-purple-800/50 transition-colors">Добавить</button>
        </div>
      </div>
      <div id="rmapList" class="flex-1 overflow-y-auto hide-scroll flex flex-col gap-2"></div>
    </div>
  </main>

  <div id="globalToast" class="fixed bottom-6 right-6 z-[100] transform translate-y-24 opacity-0 transition-all duration-500 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 p-4 rounded-2xl shadow-2xl flex items-start gap-4 max-w-sm pointer-events-none">
    <div id="toastIconBg" class="p-2.5 rounded-full flex-shrink-0 bg-blue-50 dark:bg-blue-900/30"><i id="toastIcon" data-lucide="info" class="w-5 h-5 text-blue-500"></i></div>
    <div><h4 id="toastTitle" class="text-sm font-bold text-gray-900 dark:text-white mb-1">Уведомление</h4><p id="toastDesc" class="text-xs text-gray-500 leading-relaxed">Описание</p></div>
  </div>

  <script>
    if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
    lucide.createIcons();

    let currentUser = null;
    let portalTasks = [];
    let portalVacancies = [];
    let portalRoadmap = [];

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (userDoc.exists) {
           const data = userDoc.data();
           if (data.plan !== 'pro') {
             window.location.href = 'index.html'; 
           } else {
             portalTasks = data.portalTasks || [];
             portalVacancies = data.portalVacancies || [];
             portalRoadmap = data.portalRoadmap || [];
             renderAll();
           }
        }
      } else {
        window.location.href = 'index.html';
      }
    });

    function renderAll() {
      renderTasks(); renderVacancies(); renderRoadmap();
      initSortables();
    }

    function renderTasks() {
      const list = document.getElementById('tasksList');
      if(portalTasks.length === 0) { list.innerHTML = '<div class="text-center text-xs text-gray-400 py-4 italic">Пусто</div>'; return; }
      list.innerHTML = portalTasks.map((t, i) => `
        <div class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-xl" data-id="${t.id}">
          <i data-lucide="grip-vertical" class="w-4 h-4 text-gray-400 drag-handle"></i>
          <span class="flex-1 text-sm font-medium dark:text-white truncate">${t.text}</span>
          <button onclick="portalTasks.splice(${i}, 1); renderTasks();" class="text-gray-400 hover:text-red-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function renderVacancies() {
      const list = document.getElementById('jobsList');
      if(portalVacancies.length === 0) { list.innerHTML = '<div class="text-center text-xs text-gray-400 py-4 italic">Пусто</div>'; return; }
      list.innerHTML = portalVacancies.map((j, i) => `
        <div class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-xl" data-id="${j.id}">
          <i data-lucide="grip-vertical" class="w-4 h-4 text-gray-400 drag-handle"></i>
          <div class="flex-1 min-w-0 flex flex-col">
            <span class="text-xs font-bold dark:text-white truncate">${j.title}</span>
            <span class="text-[10px] text-emerald-500 font-black">${j.salary}</span>
          </div>
          <button onclick="portalVacancies.splice(${i}, 1); renderVacancies();" class="text-gray-400 hover:text-red-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function renderRoadmap() {
      const list = document.getElementById('rmapList');
      if(portalRoadmap.length === 0) { list.innerHTML = '<div class="text-center text-xs text-gray-400 py-4 italic">Пусто</div>'; return; }
      list.innerHTML = portalRoadmap.map((r, i) => `
        <div class="flex items-start gap-3 p-3 bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-xl relative" data-id="${r.id}">
          <i data-lucide="grip-vertical" class="w-4 h-4 text-gray-400 drag-handle mt-1"></i>
          <div class="flex-1 min-w-0">
            <div class="text-[10px] font-black uppercase text-${r.color}-500 mb-0.5">${r.quarter}</div>
            <div class="text-xs font-bold dark:text-white truncate mb-0.5">${r.title}</div>
            <div class="text-[10px] text-gray-500 line-clamp-2">${r.desc}</div>
          </div>
          <button onclick="portalRoadmap.splice(${i}, 1); renderRoadmap();" class="text-gray-400 hover:text-red-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function initSortables() {
      ['tasksList', 'jobsList', 'rmapList'].forEach(id => {
        const el = document.getElementById(id);
        if(el) {
          new Sortable(el, {
            handle: '.drag-handle', animation: 150, ghostClass: 'sortable-ghost',
            onEnd: function(evt) {
              let arr = id === 'tasksList' ? portalTasks : id === 'jobsList' ? portalVacancies : portalRoadmap;
              const item = arr.splice(evt.oldIndex, 1)[0];
              arr.splice(evt.newIndex, 0, item);
            }
          });
        }
      });
    }

    function addTask() {
      const text = document.getElementById('newTaskInput').value.trim();
      if(!text) return;
      portalTasks.push({ id: Date.now(), text });
      document.getElementById('newTaskInput').value = '';
      renderTasks();
    }

    function addJob() {
      const title = document.getElementById('newJobTitle').value.trim();
      const salary = document.getElementById('newJobSalary').value.trim();
      const link = document.getElementById('newJobLink').value.trim();
      if(!title || !link) return showSystemToast('Ошибка', 'Укажите должность и ссылку', 'alert-circle', 'text-red-500', 'bg-red-50');
      portalVacancies.push({ id: Date.now(), title, salary, link });
      document.getElementById('newJobTitle').value = ''; document.getElementById('newJobSalary').value = ''; document.getElementById('newJobLink').value = '';
      renderVacancies();
    }

    function addRoadmap() {
      const quarter = document.getElementById('newRmQuarter').value.trim();
      const title = document.getElementById('newRmTitle').value.trim();
      const desc = document.getElementById('newRmDesc').value.trim();
      const color = document.getElementById('newRmColor').value;
      if(!quarter || !title) return showSystemToast('Ошибка', 'Укажите квартал и заголовок', 'alert-circle', 'text-red-500', 'bg-red-50');
      portalRoadmap.push({ id: Date.now(), quarter, title, desc, color });
      document.getElementById('newRmQuarter').value = ''; document.getElementById('newRmTitle').value = ''; document.getElementById('newRmDesc').value = '';
      renderRoadmap();
    }

    async function saveAllPortalData() {
      const btn = document.getElementById('saveGlobalBtn');
      const ogHtml = btn.innerHTML;
      btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Сохраняем...';
      lucide.createIcons();

      try {
        await db.collection('users').doc(currentUser.uid).update({
          portalTasks, portalVacancies, portalRoadmap
        });
        showSystemToast('Опубликовано', 'Данные успешно сохранены на портале!', 'check-circle', 'text-emerald-500', 'bg-emerald-50');
      } catch(e) {
        showSystemToast('Ошибка', 'Сбой сохранения.', 'x-circle', 'text-red-500', 'bg-red-50');
      } finally {
        btn.innerHTML = ogHtml;
        lucide.createIcons();
      }
    }

    let toastTimeout;
    function showSystemToast(title, desc, iconName, iconColor, bgColor) {
      const toast = document.getElementById('globalToast');
      document.getElementById('toastTitle').innerText = title; document.getElementById('toastDesc').innerText = desc;
      const iconEl = document.getElementById('toastIcon'); iconEl.setAttribute('data-lucide', iconName); iconEl.className = `w-5 h-5 ${iconColor}`;
      document.getElementById('toastIconBg').className = `p-2.5 rounded-full flex-shrink-0 ${bgColor}`;
      lucide.createIcons();
      toast.classList.remove('translate-y-24', 'opacity-0');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.add('translate-y-24', 'opacity-0'), 5000);
    }
  </script>
</body>
</html>
